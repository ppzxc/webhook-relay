server:
  port: 8080
  readTimeout: 30s
  writeTimeout: 30s
  tls:
    enabled: false
    certFile: ""
    keyFile: ""

log:
  level: INFO    # DEBUG, INFO, WARN, ERROR
  format: JSON   # JSON, TEXT

inputs:
  - id: beszel
    engine: CEL          # required — used for filter/mapping/routing; CEL or EXPR
    parser: JSON         # JSON, FORM, XML, LOGFMT, REGEX
    secret: "change-me"
    rules:
      # Rule 1: conditional routing for HIGH severity
      - filter: 'data.severity == "HIGH"'
        mapping:
          level: '"CRITICAL"'
        routing:
          - condition: 'data.level == "CRITICAL"'
            outputIds: [ops-webhook]
      # Rule 2: always forward to notification bot (no filter)
      - outputIds: [naver-works-bot]

  - id: dozzle
    engine: CEL
    parser: JSON
    secret: "change-me"
    rules:
      - outputIds: [ops-webhook]   # simple: no filter/routing, send to all

  - id: tcp-input
    engine: CEL
    address: ":9001"
    delimiter: "\n"
    parser: JSON
    rules:
      - outputIds: [ops-webhook]

outputs:
  - id: ops-webhook
    type: WEBHOOK
    engine: CEL          # required — used for template evaluation; CEL or EXPR
    url: "https://hooks.example.com/xyz"
    template:
      text: 'data.input + ": " + data.payload'
    retryCount: 3
    retryDelayMs: 1000
    skipTLSVerify: false

  # Naver Works Bot — textToAll
  # POST /api/v1/bots/{botId}/text → {"content": {"type": "text", "text": "..."}}
  # Dot-notation keys (content.type, content.text) produce nested JSON.
  - id: naver-works-bot
    type: WEBHOOK
    engine: CEL
    url: "https://naver-works-bot.nanoit.kr/api/v1/bots/1/text"
    secret: "change-me-jwt-token"   # Bearer JWT issued by Naver Works
    template:
      content.type: '"text"'
      content.text: 'data.input + " alert: " + data.payload'
    retryCount: 3
    retryDelayMs: 1000
    timeoutSec: 10

storage:
  type: SQLITE
  path: "./data/relaybox.db"
  tableName: messages       # 메시지 테이블 이름 (기본값: messages)

queue:
  type: FILE
  path: "./data/queue"
  workerCount: 2

worker:
  defaultRetryCount: 3      # fallback retry count (must be ≥1; values ≤0 are replaced with default 3)
  defaultRetryDelay: "1s"   # fallback base retry delay (Go duration string)
  pollBackoff: "500ms"      # sleep duration between empty-queue polls
