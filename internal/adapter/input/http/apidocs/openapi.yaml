openapi: "3.1.0"

info:
  title: relaybox API
  version: "2026-03-20"
  description: |
    relaybox — 범용 릴레이 허브. 모니터링 앱(Beszel, Dozzle 등)으로부터 메시지를 수신하여 템플릿을 통해 외부 출력으로 전달합니다.

servers:
  - url: http://localhost:8080
    description: 로컬 개발

security:
  - bearerAuth: []

tags:
  - name: messages
    description: 메시지 관리
  - name: inputs
    description: 입력 관리
  - name: outputs
    description: 출력 관리
  - name: health
    description: 헬스 체크

paths:
  /healthz:
    get:
      summary: 헬스 체크
      operationId: healthz
      tags: [health]
      security: []
      x-codeSamples:
        - lang: Shell
          label: curl
          source: |
            curl http://localhost:8080/healthz
      responses:
        "200":
          description: 서비스 정상
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                required: [status]
              example:
                status: ok

  /inputs/{inputId}/messages:
    post:
      summary: 메시지 수신
      operationId: postMessage
      tags: [messages]
      parameters:
        - $ref: "#/components/parameters/inputId"
      x-codeSamples:
        - lang: Shell
          label: curl
          source: |
            curl -X POST http://localhost:8080/inputs/beszel/messages \
              -H "Authorization: Bearer <secret>" \
              -H "Content-Type: application/json" \
              -d '{"title":"CPU Alert","message":"CPU usage exceeded 90% on server-01"}'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: 입력별 JSON 페이로드
              additionalProperties: true
            example:
              title: "CPU Alert"
              message: "CPU usage exceeded 90% on server-01"
      responses:
        "201":
          description: 메시지 생성됨
          headers:
            Location:
              description: 생성된 메시지의 URL
              schema:
                type: string
                example: /inputs/beszel/messages/01J...
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageCreatedResponse"
              example:
                id: "01JEXAMPLE000000000000001"
                inputId: beszel
                status: PENDING
                createdAt: "2026-03-24T12:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalServerError"

    get:
      summary: 입력별 메시지 목록 조회
      operationId: listMessages
      tags: [messages]
      parameters:
        - $ref: "#/components/parameters/inputId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      x-codeSamples:
        - lang: Shell
          label: curl
          source: |
            curl "http://localhost:8080/inputs/beszel/messages?limit=20&offset=0" \
              -H "Authorization: Bearer <secret>"
      responses:
        "200":
          description: 메시지 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
              example:
                - id: "01JEXAMPLE000000000000001"
                  inputId: beszel
                  status: DELIVERED
                  createdAt: "2026-03-24T12:00:00Z"
                  retryCount: 1
                  lastAttemptAt: "2026-03-24T12:00:05Z"
                - id: "01JEXAMPLE000000000000002"
                  inputId: beszel
                  status: PENDING
                  createdAt: "2026-03-24T11:55:00Z"
                  retryCount: 0
                  lastAttemptAt: null
        "401":
          $ref: "#/components/responses/Unauthorized"

  /inputs/{inputId}/messages/{messageId}:
    get:
      summary: 메시지 ID로 조회
      operationId: getMessage
      tags: [messages]
      parameters:
        - $ref: "#/components/parameters/inputId"
        - $ref: "#/components/parameters/messageId"
      x-codeSamples:
        - lang: Shell
          label: curl
          source: |
            curl http://localhost:8080/inputs/beszel/messages/01JEXAMPLE000000000000001 \
              -H "Authorization: Bearer <secret>"
      responses:
        "200":
          description: 메시지 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
              example:
                id: "01JEXAMPLE000000000000001"
                inputId: beszel
                status: DELIVERED
                createdAt: "2026-03-24T12:00:00Z"
                retryCount: 1
                lastAttemptAt: "2026-03-24T12:00:05Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      summary: 메시지 상태 변경
      operationId: patchMessage
      tags: [messages]
      description: |
        허용 전환: FAILED → PENDING (수동 재큐잉).
        그 외 전환은 422를 반환합니다.
      parameters:
        - $ref: "#/components/parameters/inputId"
        - $ref: "#/components/parameters/messageId"
      x-codeSamples:
        - lang: Shell
          label: curl
          source: |
            curl -X PATCH http://localhost:8080/inputs/beszel/messages/01JEXAMPLE000000000000001 \
              -H "Authorization: Bearer <secret>" \
              -H "Content-Type: application/json" \
              -d '{"status":"PENDING"}'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [PENDING]
              required: [status]
            example:
              status: PENDING
      responses:
        "200":
          description: 메시지 업데이트됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
              example:
                id: "01JEXAMPLE000000000000001"
                inputId: beszel
                status: PENDING
                createdAt: "2026-03-24T12:00:00Z"
                retryCount: 1
                lastAttemptAt: "2026-03-24T12:00:05Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /inputs:
    get:
      summary: 입력 목록 조회
      operationId: listInputs
      security: []
      tags: [inputs]
      x-codeSamples:
        - lang: Shell
          label: curl
          source: |
            curl http://localhost:8080/inputs
      responses:
        "200":
          description: 입력 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Input"
              example:
                - id: beszel
                - id: dozzle

  /inputs/{inputId}:
    get:
      summary: 입력 ID로 조회
      operationId: getInput
      security: []
      tags: [inputs]
      parameters:
        - $ref: "#/components/parameters/inputId"
      x-codeSamples:
        - lang: Shell
          label: curl
          source: |
            curl http://localhost:8080/inputs/beszel
      responses:
        "200":
          description: 입력 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Input"
              example:
                id: beszel
        "404":
          $ref: "#/components/responses/NotFound"

  /outputs:
    get:
      summary: 출력 목록 조회
      operationId: listOutputs
      security: []
      tags: [outputs]
      x-codeSamples:
        - lang: Shell
          label: curl
          source: |
            curl http://localhost:8080/outputs
      responses:
        "200":
          description: 출력 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Output"
              example:
                - id: ops-webhook
                  type: WEBHOOK
                  url: "https://hooks.example.com/xyz"
                  retryCount: 3
                  retryDelayMs: 1000

  /outputs/{outputId}:
    get:
      summary: 출력 ID로 조회
      operationId: getOutput
      security: []
      tags: [outputs]
      parameters:
        - $ref: "#/components/parameters/outputId"
      x-codeSamples:
        - lang: Shell
          label: curl
          source: |
            curl http://localhost:8080/outputs/ops-webhook
      responses:
        "200":
          description: 출력 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Output"
              example:
                id: ops-webhook
                type: WEBHOOK
                url: "https://hooks.example.com/xyz"
                retryCount: 3
                retryDelayMs: 1000
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 입력별 Bearer 토큰 (config에서 설정)

  parameters:
    inputId:
      name: inputId
      in: path
      required: true
      schema:
        type: string
        example: beszel
    messageId:
      name: messageId
      in: path
      required: true
      schema:
        type: string
        example: 01J...
    outputId:
      name: outputId
      in: path
      required: true
      schema:
        type: string
        example: ops-webhook

  schemas:
    MessageStatus:
      type: string
      enum: [PENDING, DELIVERED, FAILED]
      description: |
        메시지 전달 상태.
        전환: PENDING → DELIVERED (성공), PENDING → FAILED (재시도 소진),
        FAILED → PENDING (PATCH를 통한 수동 재큐잉).

    Message:
      type: object
      properties:
        id:
          type: string
          description: ULID
        inputId:
          type: string
        status:
          $ref: "#/components/schemas/MessageStatus"
        createdAt:
          type: string
          format: date-time
        retryCount:
          type: integer
          description: 전달 시도 횟수
        lastAttemptAt:
          type: ["string", "null"]
          format: date-time
      required: [id, inputId, status, createdAt, retryCount]

    MessageCreatedResponse:
      type: object
      properties:
        id:
          type: string
        inputId:
          type: string
        status:
          $ref: "#/components/schemas/MessageStatus"
        createdAt:
          type: string
          format: date-time
      required: [id, inputId, status, createdAt]

    Input:
      type: object
      properties:
        id:
          type: string
      required: [id]

    Output:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [WEBHOOK, SLACK, DISCORD]
        url:
          type: string
        retryCount:
          type: integer
        retryDelayMs:
          type: integer
      required: [id, type, url, retryCount, retryDelayMs]

    Problem:
      type: object
      description: RFC 7807/9457 Problem Details 오류 응답
      properties:
        type:
          type: string
          example: /errors/Unauthorized
        title:
          type: string
          example: Unauthorized
        status:
          type: integer
          example: 401
        detail:
          type: string
          example: "invalid or missing token for input: beszel"
        traceId:
          type: string
      required: [type, title, status, detail]

  responses:
    Unauthorized:
      description: Bearer 토큰 누락 또는 유효하지 않음
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: /errors/Unauthorized
            title: Unauthorized
            status: 401
            detail: "invalid or missing token for input: beszel"
    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: /errors/NotFound
            title: Not Found
            status: 404
            detail: "message not found"
    PayloadTooLarge:
      description: 요청 본문이 1MB 제한 초과
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: /errors/PayloadTooLarge
            title: Payload Too Large
            status: 413
            detail: "request body exceeds 1MB limit"
    UnprocessableEntity:
      description: 유효하지 않은 상태 전환
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: /errors/UnprocessableEntity
            title: Unprocessable Entity
            status: 422
            detail: "only status=\"PENDING\" is accepted"
    InternalServerError:
      description: 예기치 않은 서버 오류
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: /errors/InternalServerError
            title: Internal Server Error
            status: 500
            detail: "unexpected error occurred"
