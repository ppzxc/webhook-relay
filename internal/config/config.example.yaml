server:
  port: 8080
  readTimeout: 30s
  writeTimeout: 30s
  tls:
    enabled: false
    certFile: ""
    keyFile: ""

log:
  level: info    # debug, info, warn, error
  format: json   # json, text

expression:
  defaultEngine: cel  # cel or expr

inputs:
  - id: beszel
    type: BESZEL
    parser: json      # json, form, xml, logfmt, regex
    secret: "change-me"
  - id: dozzle
    type: DOZZLE
    parser: json
    secret: "change-me"
  - id: tcp-input
    type: GENERIC
    address: ":9001"
    delimiter: "\n"
    parser: json
    secret: ""  # secret unused for TCP inputs (no token auth)

outputs:
  - id: ops-webhook
    type: WEBHOOK
    url: "https://hooks.example.com/xyz"
    template:
      text: 'data.input + ": " + data.payload'
    retryCount: 3
    retryDelayMs: 1000
    skipTLSVerify: false

  # Naver Works Bot — textToAll
  # POST /api/v1/bots/{botId}/text → {"content": {"type": "text", "text": "..."}}
  # Dot-notation keys (content.type, content.text) produce nested JSON.
  - id: naver-works-bot
    type: WEBHOOK
    url: "https://naver-works-bot.nanoit.kr/api/v1/bots/1/text"
    secret: "change-me-jwt-token"   # Bearer JWT issued by Naver Works
    template:
      content.type: '"text"'
      content.text: 'data.input + " alert: " + data.payload'
    retryCount: 3
    retryDelayMs: 1000
    timeoutSec: 10

rules:
  - inputId: beszel
    engine: cel           # override default engine per rule
    filter: 'data.input == "BESZEL"'
    mapping:
      severity: '"HIGH"'
    routing:
      - condition: 'data.severity == "HIGH"'
        outputIds: [ops-webhook]
  - inputId: dozzle
    outputIds: [ops-webhook]  # simple: no filter/routing, send to all

  # Example: forward both Beszel and Dozzle alerts to Naver Works Bot
  # - inputId: beszel
  #   outputIds: [naver-works-bot]
  # - inputId: dozzle
  #   outputIds: [naver-works-bot]

storage:
  type: SQLITE
  path: "./data/relaybox.db"

queue:
  type: FILE
  path: "./data/queue"
  workerCount: 2
