server:
  port: 8080
  readTimeout: 30s
  writeTimeout: 30s
  tls:
    enabled: false
    certFile: ""
    keyFile: ""

log:
  level: info    # debug, info, warn, error
  format: json   # json, text

inputs:
  - id: beszel
    type: BESZEL
    secret: "change-me"
  - id: dozzle
    type: DOZZLE
    secret: "change-me"

outputs:
  - id: ops-webhook
    type: WEBHOOK
    url: "https://hooks.example.com/xyz"
    template: |
      {"text": "{{ .Source }}: {{ .Payload }}"}
    retryCount: 3
    retryDelayMs: 1000
    skipTLSVerify: false

rules:
  - inputId: beszel
    outputIds: [ops-webhook]
  - inputId: dozzle
    outputIds: [ops-webhook]

storage:
  type: SQLITE
  path: "./data/relaybox.db"

queue:
  type: FILE
  path: "./data/queue"
  workerCount: 2
