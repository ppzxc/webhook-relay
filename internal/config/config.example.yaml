server:
  port: 8080
  readTimeout: 30s
  writeTimeout: 30s
  tls:
    enabled: false
    certFile: ""
    keyFile: ""

log:
  level: info    # debug, info, warn, error
  format: json   # json, text

expression:
  defaultEngine: cel  # cel or expr

inputs:
  - id: beszel
    type: BESZEL
    parser: json      # json, form, xml, logfmt, regex
    secret: "change-me"
  - id: dozzle
    type: DOZZLE
    parser: json
    secret: "change-me"

outputs:
  - id: ops-webhook
    type: WEBHOOK
    url: "https://hooks.example.com/xyz"
    template:
      text: 'data.input + ": " + data.payload'
    retryCount: 3
    retryDelayMs: 1000
    skipTLSVerify: false

rules:
  - inputId: beszel
    engine: cel           # override default engine per rule
    filter: 'data.input == "BESZEL"'
    mapping:
      severity: '"HIGH"'
    routing:
      - condition: 'data.severity == "HIGH"'
        outputIds: [ops-webhook]
  - inputId: dozzle
    outputIds: [ops-webhook]  # simple: no filter/routing, send to all

storage:
  type: SQLITE
  path: "./data/relaybox.db"

queue:
  type: FILE
  path: "./data/queue"
  workerCount: 2
