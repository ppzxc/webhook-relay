asyncapi: "3.0.0"

info:
  title: relaybox WebSocket API
  version: "2026-03-20"
  description: |
    Inbound WebSocket API for relaybox.
    Monitoring apps (Beszel, Dozzle, etc.) connect and push message payloads to the server.
    The server processes each message via ReceiveMessageUseCase.

servers:
  local:
    host: localhost:8080
    protocol: ws
    description: Local development server
    security:
      - $ref: "#/components/securitySchemes/bearerAuth"

channels:
  messages:
    address: /inputs/{inputId}/messages/ws
    description: |
      WebSocket channel for inbound message delivery.
      Authenticate with Authorization: Bearer <token> on connect.
    parameters:
      inputId:
        description: Input identifier (must match a configured input)
    messages:
      messagePayload:
        $ref: "#/components/messages/MessagePayload"

operations:
  receiveMessage:
    action: receive
    channel:
      $ref: "#/channels/messages"
    summary: Receive message from monitoring app
    description: |
      The server receives JSON message payloads pushed by the connected monitoring app.
      Each message triggers ReceiveMessageUseCase.Receive(), which:
      1. Creates a Message entity (status=PENDING)
      2. Persists to SQLite
      3. Enqueues for async delivery to configured outputs
    messages:
      - $ref: "#/channels/messages/messages/messagePayload"

components:
  messages:
    MessagePayload:
      name: MessagePayload
      title: Message Payload
      summary: Raw JSON payload from monitoring app
      contentType: application/json
      payload:
        type: object
        description: |
          Input-specific JSON payload. Structure varies by input type.
          The relay stores and forwards this payload as-is, applying the
          output's CEL/Expr expression template for transformation on delivery.
        additionalProperties: true
        examples:
          - summary: Beszel message example
            value:
              level: critical
              message: CPU usage exceeded 90%
              host: prod-server-01

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Input-specific bearer token. Same token used for HTTP POST endpoint.
