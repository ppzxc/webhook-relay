services:
  relaybox:
    # 사전에 이미지를 빌드해야 합니다: make docker-build
    # config.yaml이 없으면 서버가 시작되지 않습니다.
    # docs/config.docker-sqlite.yaml 또는 docs/config.docker-mariadb.yaml 을 복사하여 사용하세요.
    image: relaybox:${VERSION:-latest}
    container_name: relaybox
    network_mode: host
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - relaybox-data:/app/data
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Seoul}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.25"
          memory: 64M

volumes:
  relaybox-data:
